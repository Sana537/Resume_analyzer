<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="text-center mb-5">
        <h1 class="fw-bold">🚀 AI Resume Analyzer</h1>
        <p class="text-muted">Match your resume with job descriptions using AI</p>
    </div>

    <div class="card shadow-lg p-4">
        <form method="POST" enctype="multipart/form-data">

            <!-- Resume Upload -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Upload Resume (PDF)</label>
                <input class="form-control" type="file" name="resume" required>
            </div>

            <!-- Job Description -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Paste Job Description</label>
                <textarea class="form-control" name="job_description" rows="6" placeholder="Enter job description here..." required></textarea>
            </div>

            <!-- Submit -->
            <div class="d-grid">
                <button class="btn btn-primary btn-lg">Analyze Resume</button>
            </div>

        </form>
    </div>

    <!-- Result Section -->
    {% if result %}
    <div class="card shadow mt-5 p-4">
        <h4 class="mb-3">📊 Analysis Result</h4>
        <pre class="bg-dark text-white p-3 rounded">{{ result }}</pre>
    </div>
    {% endif %}

</div>

</body>
</html>
